  <!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yael Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="text/javascript">
      document.onkeydown = function(){return false};
        document.oncontextmenu = function(){return false}
    </script>
</head>
<body>

    <div class="waves-container">
        <div class="wave wave1"></div>
        <div class="wave wave2"></div>
        <div class="wave wave3"></div>
    </div>

    <div class="profile-card">
        <div class="avatar-group">
            <div class="border-deco"></div>
            <img src="https://xatimg.com/image/MJiITVHiKhhG.png" alt="Profile" class="profile-pic">
        </div>
        <h1 class="name">Yael</h1>
        <div class="location">Argentina</div>
        <p class="bio">"𝑆𝑡𝑎𝑟𝑡 𝑏𝑦 𝑑𝑜𝑖𝑛𝑔 𝑤ℎ𝑎𝑡'𝑠 𝑛𝑒𝑐𝑒𝑠𝑠𝑎𝑟𝑦; 𝑡ℎ𝑒𝑛 𝑑𝑜 𝑤ℎ𝑎𝑡'𝑠 𝑝𝑜𝑠𝑠𝑖𝑏𝑙𝑒; 𝑎𝑛𝑑 𝑠𝑢𝑑𝑑𝑒𝑛𝑙𝑦 𝑦𝑜𝑢 𝑎𝑟𝑒 𝑑𝑜𝑖𝑛𝑔 𝑡ℎ𝑒 𝑖𝑚𝑝𝑜𝑠𝑠𝑖𝑏𝑙𝑒."</p>
    </div>

    <div class="mini-player-trigger">
        <button class="play-btn" onclick="togglePlaylist(event)">
            <i class="fas fa-music"></i>
        </button>   
    </div>

    <div class="playlist-modal" id="musicModal">
        <div class="cd-container">
            <img src="https://i.scdn.co/image/ab67616d0000b2732b0ba87db609976eee193bd6" alt="Cover" class="cd-image" id="cdThumb">
        </div>
        <div class="song-info" style="text-align: center; margin-top: 10px;">
            <span class="song-title" id="currentTitle">Tattoo</span><br>
            <span class="song-artist" style="font-size: 0.8rem; opacity: 0.8;">Loreen</span>
        </div>
        <div style="display: flex; gap: 20px; margin-top: 15px; font-size: 1.5rem; color: white;">
            <i class="fas fa-step-backward" style="cursor:pointer" onclick="prevTrack()"></i>
            <i class="fas fa-play" id="mainPlayBtn" style="cursor:pointer; color: var(--accent-color);" onclick="togglePlay()"></i>
            <i class="fas fa-step-forward" style="cursor:pointer" onclick="nextTrack()"></i>
        </div>
    </div>

    <audio id="myAudio" loop></audio>

</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
